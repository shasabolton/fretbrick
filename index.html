<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fretbrick</title>
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; }
    #app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .toolbar {
      flex-shrink: 0;
      padding: 8px 12px;
      background: #333;
      color: #fff;
      font-family: sans-serif;
      font-size: 13px;
    }
    .toolbar-controls {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .toolbar-row {
      display: flex;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 10px;
      min-width: 0;
    }
    .toolbar-field {
      display: flex;
      flex-direction: column;
      gap: 3px;
      min-width: 0;
    }
    .toolbar-field > span {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      opacity: 0.9;
    }
    .toolbar-field.compact {
      width: max-content;
    }
    .toolbar-field.compact select {
      width: 100%;
      min-width: 0;
    }
    .toolbar-field.medium select {
      width: 170px;
      max-width: 32vw;
    }
    .toolbar-field.wide select {
      width: 240px;
      max-width: 42vw;
    }
    .toolbar-actions {
      padding-top: 6px;
      border-top: 1px solid rgba(255, 255, 255, 0.18);
    }
    .toolbar-toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 12px;
    }
    .toolbar-toggle input {
      margin: 0;
    }
    .toolbar select,
    .toolbar button {
      font: inherit;
      padding: 2px 6px;
      height: 24px;
    }
    .toolbar select {
      line-height: 1.1;
      white-space: normal;
      overflow-wrap: anywhere;
      text-wrap: wrap;
    }
    .toolbar option {
      white-space: normal;
      overflow-wrap: anywhere;
    }
    #key-select,
    #bpm-select {
      width: 4.2ch;
    }
    .canvas-wrap {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f0f0f0;
    }
    .canvas-wrap canvas {
      max-width: 100%;
      max-height: 100%;
      display: block;
      cursor: grab;
      touch-action: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <div class="toolbar-controls">
        <div class="toolbar-row">
          <label class="toolbar-field compact" for="key-select">
            <span>Key</span>
            <select id="key-select">
              <option value="E">E</option>
              <option value="F">F</option>
              <option value="F#">F#</option>
              <option value="G">G</option>
              <option value="G#">G#</option>
              <option value="A">A</option>
              <option value="A#">A#</option>
              <option value="B">B</option>
              <option value="C" selected>C</option>
              <option value="C#">C#</option>
              <option value="D">D</option>
              <option value="D#">D#</option>
            </select>
          </label>
          <label class="toolbar-field wide" for="progression-select">
            <span>Progression</span>
            <select id="progression-select">
              <option value="">Single brick location map</option>
            </select>
          </label>
          <label class="toolbar-field compact" for="bpm-select">
            <span>BPM</span>
            <select id="bpm-select">
              <option value="100" selected>100</option>
            </select>
          </label>
        </div>
        <div class="toolbar-row">
          <label class="toolbar-field medium" for="drum-pattern-select">
            <span>Drums</span>
            <select id="drum-pattern-select">
              <option value="">No drums</option>
            </select>
          </label>
          <label class="toolbar-field medium" for="playback-mode-select">
            <span>Bass</span>
            <select id="playback-mode-select">
              <option value="root" selected>Root</option>
              <option value="root5th">Root 5th</option>
              <option value="arpeggio135">Arpeggio 1,3,5</option>
              <option value="eshape513">513 E shape arpeggio</option>
              <option value="cshape1351">C shape arpeggio 1,3,5,1</option>
            </select>
          </label>
          <label class="toolbar-field medium" for="strum-pattern-select">
            <span>Strum</span>
            <select id="strum-pattern-select">
              <option value="">No strum</option>
            </select>
          </label>
          <label class="toolbar-field medium" for="riff-select">
            <span>Lead</span>
            <select id="riff-select">
              <option value="">No riff</option>
            </select>
          </label>
        </div>
        <div class="toolbar-row toolbar-actions">
          <button type="button" id="progression-play-toggle" aria-pressed="false">Play</button>
          <button type="button" id="handedness-toggle" aria-pressed="false">Left hand</button>
          <label class="toolbar-toggle">
            <input type="checkbox" id="vertical-mirror-toggle">
            <span>Vertical mirror</span>
          </label>
          <label class="toolbar-toggle">
            <input type="checkbox" id="pan-zoom-toggle" checked>
            <span>2-finger pan/zoom</span>
          </label>
          <label class="toolbar-toggle">
            <input type="checkbox" id="drag-constraint-5x1">
            <span>Constrain drag to 5x1 slope</span>
          </label>
        </div>
      </div>
    </div>
    <div class="canvas-wrap" id="canvas-wrap"></div>
  </div>
  <script src="js/Brick.js"></script>
  <script src="js/Fretscape.js"></script>
  <script src="js/DrumEngine.js"></script>
  <script src="js/App.js"></script>
</body>
</html>
